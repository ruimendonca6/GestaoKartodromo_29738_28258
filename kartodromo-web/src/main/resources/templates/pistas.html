<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Pistas - Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Pistas</h1>
            <p>Visualização e gestão dos layouts disponíveis no kartódromo</p>
        </div>

        <button class="btn btn-green"
                onclick="openModal('modal-criar')"
                th:if="${authUser.admin or authUser.funcionario}">
            + Nova Pista
        </button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>

    <div class="track-grid">
        <div th:if="${#lists.isEmpty(pistas)}" class="card">
            <p style="color:var(--text-gray);text-align:center;padding:24px">
                Nenhuma pista registada.
            </p>
        </div>

        <div th:each="p : ${pistas}" class="card track-card">
            <div class="track-image">
                <img th:if="${p.imagemPath != null and !#strings.isEmpty(p.imagemPath)}"
                     th:src="@{'/' + ${p.imagemPath}}"
                     th:alt="${p.nome}"/>

                <img th:if="${p.imagemPath == null or #strings.isEmpty(p.imagemPath)}"
                     th:src="@{/images/pista1.png}"
                     th:alt="${p.nome}"/>
            </div>

            <div class="track-content">
                <div class="flex justify-between items-center mb-16">
                    <strong th:text="${p.nome}">Pista</strong>

                    <span th:if="${p.ativa}" class="badge badge-green">Ativa</span>
                    <span th:if="${!p.ativa}" class="badge badge-gray">Inativa</span>
                </div>

                <div class="track-info">
                    <span th:text="${p.comprimento} + ' m comprimento'">0 m comprimento</span>
                    <span>·</span>
                    <span th:text="${p.capacidade} + ' lugares'">0 lugares</span>
                </div>

                <div class="flex gap-8 mt-16"
                     th:if="${authUser.admin or authUser.funcionario}">
                    <button class="btn btn-blue btn-sm"
                            th:attr="data-id=${p.id},
                                     data-nome=${p.nome},
                                     data-comprimento=${p.comprimento},
                                     data-capacidade=${p.capacidade},
                                     data-imagem-path=${p.imagemPath}"
                            onclick="populateEditFromDataset(this,'modal-editar')">
                        ✎ Editar
                    </button>

                    <form th:id="'tog-' + ${p.id}"
                          method="post"
                          action="/pistas/toggle"
                          style="display:inline">
                        <input type="hidden" name="id" th:value="${p.id}"/>

                        <button type="submit"
                                class="btn btn-gray btn-sm"
                                th:text="${p.ativa} ? '⏸ Desativar' : '▶ Ativar'">
                            Alterar
                        </button>
                    </form>

                    <form th:id="'del-' + ${p.id}"
                          method="post"
                          action="/pistas/remover"
                          style="display:inline">
                        <input type="hidden" name="id" th:value="${p.id}"/>

                        <button type="button"
                                class="btn btn-red btn-sm"
                                th:attr="data-form-id='del-' + ${p.id},
                                         data-msg='Eliminar pista ' + ${p.nome} + '?'"
                                onclick="confirmDeleteEl(this)">
                            🗑
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="modal-criar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-criar')">✕</button>

        <h2>Nova Pista</h2>

        <form method="post" action="/pistas/criar">
            <div class="form-row">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" required/>
                </div>

                <div class="form-group">
                    <label>Comprimento (m)</label>
                    <input type="number" name="comprimento" min="1" value="500" required/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Capacidade (lugares)</label>
                    <input type="number" name="capacidade" min="1" value="10" required/>
                </div>

                <div class="form-group">
                    <label>Imagem</label>
                    <select name="imagemPath">
                        <option value="images/pista1.png">Pista Técnica</option>
                        <option value="images/pista2.png">Pista Completa</option>
                        <option value="images/pista3.png">Pista Sprint</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-green">Criar Pista</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-criar')">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="modal-editar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-editar')">✕</button>

        <h2>Editar Pista</h2>

        <form method="post" action="/pistas/atualizar">
            <input type="hidden" name="id"/>

            <div class="form-row">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" required/>
                </div>

                <div class="form-group">
                    <label>Comprimento (m)</label>
                    <input type="number" name="comprimento" min="1" required/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Capacidade (lugares)</label>
                    <input type="number" name="capacidade" min="1" required/>
                </div>

                <div class="form-group">
                    <label>Imagem</label>
                    <select name="imagemPath">
                        <option value="images/pista1.png">Pista Técnica</option>
                        <option value="images/pista2.png">Pista Completa</option>
                        <option value="images/pista3.png">Pista Sprint</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-blue">Guardar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-editar')">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
