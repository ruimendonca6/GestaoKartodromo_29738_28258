<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Resultados - Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Resultados</h1>
            <p>Tempos e classificações das corridas</p>
        </div>
        <button class="btn btn-green" onclick="openModal('modal-registar')">+ Registar Resultado</button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert-error"   th:text="${erro}"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
        <!-- Melhor Volta por Piloto -->
        <div class="card">
            <div class="card-title">🏆 Melhor Volta por Piloto</div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Piloto</th><th>Corrida</th><th>Tempo</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(melhorVolta)}">
                            <td colspan="3" style="text-align:center;color:var(--text-gray);padding:16px">Sem dados</td>
                        </tr>
                        <tr th:each="r : ${melhorVolta}">
                            <td><strong th:text="${r.nomePiloto}"></strong></td>
                            <td th:text="${r.nomeCorrida}" class="text-gray"></td>
                            <td><span class="badge badge-green" th:text="${#numbers.formatInteger(r.tempoMs / 60000, 1)} + ':' + ${#numbers.formatInteger((r.tempoMs % 60000) / 1000, 2)} + '.' + ${#numbers.formatInteger(r.tempoMs % 1000, 3)}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Classificação Geral -->
        <div class="card">
            <div class="card-title">📊 Classificação Geral</div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>#</th><th>Piloto</th><th>Corrida</th><th>Posição</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(classificacao)}">
                            <td colspan="4" style="text-align:center;color:var(--text-gray);padding:16px">Sem dados</td>
                        </tr>
                        <tr th:each="r,i : ${classificacao}">
                            <td class="text-gray" th:text="${i.index + 1}"></td>
                            <td><strong th:text="${r.nomePiloto}"></strong></td>
                            <td th:text="${r.nomeCorrida}" class="text-gray"></td>
                            <td><span class="badge badge-blue" th:text="${r.posicao} + 'º'"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Todos os Resultados -->
    <div class="card">
        <div class="card-title">Todos os Resultados</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Piloto</th><th>Corrida</th><th>Tempo</th><th>Posição</th><th>Data</th><th>Ação</th></tr></thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(resultados)}">
                        <td colspan="6" style="text-align:center;color:var(--text-gray);padding:24px">Nenhum resultado registado.</td>
                    </tr>
                    <tr th:each="r : ${resultados}">
                        <td><strong th:text="${r.nomePiloto}"></strong></td>
                        <td th:text="${r.nomeCorrida}"></td>
                        <td th:text="${#numbers.formatInteger(r.tempoMs / 60000, 1)} + ':' + ${#numbers.formatInteger((r.tempoMs % 60000) / 1000, 2)} + '.' + ${#numbers.formatInteger(r.tempoMs % 1000, 3)}"></td>
                        <td><span class="badge badge-blue" th:text="${r.posicao} + 'º'"></span></td>
                        <td th:text="${#temporals.format(r.dataCorrida,'dd/MM/yyyy')}" class="text-gray"></td>
                        <td>
                            <form method="post" action="/resultados/remover">
                                <input type="hidden" name="id" th:value="${r.id}"/>
                                <button type="submit" class="btn btn-red btn-xs">🗑</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Registar -->
<div class="modal-overlay" id="modal-registar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-registar')">✕</button>
        <h2>Registar Resultado</h2>
        <form method="post" action="/resultados/registar">
            <div class="form-row">
                <div class="form-group">
                    <label>Piloto</label>
                    <input type="text" name="nomePiloto" required/>
                </div>
                <div class="form-group">
                    <label>Corrida</label>
                    <input type="text" name="nomeCorrida" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Min</label>
                    <input type="number" name="minutos" min="0" value="0" required/>
                </div>
                <div class="form-group">
                    <label>Seg</label>
                    <input type="number" name="segundos" min="0" max="59" value="0" required/>
                </div>
                <div class="form-group">
                    <label>Ms</label>
                    <input type="number" name="milissegundos" min="0" max="999" value="0" required/>
                </div>
                <div class="form-group">
                    <label>Posição</label>
                    <input type="number" name="posicao" min="1" value="1" required/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">Registar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-registar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
