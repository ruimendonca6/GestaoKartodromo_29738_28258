<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' - Kartódromo'">Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
    <a class="sidebar-brand" href="/dashboard">
        🏁 Kartódromo
        <span th:text="'Olá, ' + ${authUser.username} + ' · ' + ${authUser.role}">Utilizador</span>
    </a>

    <div th:if="${authUser.admin or authUser.funcionario}">
        <div class="sidebar-section">Gestão</div>
        <a th:href="@{/dashboard}"    th:classappend="${activePage=='dashboard'}    ? 'active'">Dashboard</a>
        <a th:href="@{/clientes}"     th:classappend="${activePage=='clientes'}     ? 'active'">Clientes</a>
        <a th:href="@{/categorias}"   th:classappend="${activePage=='categorias'}   ? 'active'">Categorias</a>
        <a th:href="@{/karts}"        th:classappend="${activePage=='karts'}        ? 'active'">Karts</a>
        <a th:href="@{/corridas}"     th:classappend="${activePage=='corridas'}     ? 'active'">Corridas</a>
        <a th:href="@{/reservas}"     th:classappend="${activePage=='reservas'}     ? 'active'">Reservas</a>
        <a th:href="@{/pistas}"       th:classappend="${activePage=='pistas'}       ? 'active'">Pistas</a>
    </div>

    <div th:if="${authUser.cliente}">
        <div class="sidebar-section">Menu</div>
        <a th:href="@{/dashboard}"  th:classappend="${activePage=='dashboard'}  ? 'active'">Dashboard</a>
        <a th:href="@{/pistas}"     th:classappend="${activePage=='pistas'}     ? 'active'">Pistas</a>
        <a th:href="@{/reservas}"   th:classappend="${activePage=='reservas'}   ? 'active'">Reservas</a>
    </div>

    <div class="sidebar-footer">
        <div th:text="${authUser.email}" style="margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
        <a href="/logout">⬅ Sair</a>
    </div>
</nav>

<!-- Main -->
<main class="main">
    <th:block th:replace="${content}"/>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
