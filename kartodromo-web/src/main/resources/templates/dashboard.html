<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard - Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main dashboard-main">
    <section class="dashboard-hero">
        <div class="dashboard-overlay"></div>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Dashboard do Kartódromo</h1>
                <p th:text="'Resumo geral · ' + ${dataFormatada}">
                    Resumo geral
                </p>
            </div>

            <div class="desktop-dashboard-grid">
                <div class="desktop-dashboard-card border-blue">
                    <h3>Clientes</h3>
                    <strong class="text-blue" th:text="${totalClientes}">0</strong>
                    <span>registados</span>
                </div>

                <div class="desktop-dashboard-card border-purple">
                    <h3>Categorias</h3>
                    <strong class="text-purple" th:text="${totalCategorias}">0</strong>
                    <span>disponíveis</span>
                </div>

                <div class="desktop-dashboard-card border-green">
                    <h3>Karts</h3>
                    <strong class="text-green" th:text="${totalKarts}">0</strong>
                    <span>na frota</span>
                </div>

                <div class="desktop-dashboard-card border-orange">
                    <h3>Corridas</h3>
                    <strong class="text-orange" th:text="${totalCorridas}">0</strong>
                    <span>realizadas</span>
                </div>

                <div class="desktop-dashboard-card border-red">
                    <h3>Reservas</h3>
                    <strong class="text-red" th:text="${totalReservas}">0</strong>
                    <span th:text="${confirmadasHoje + ' confirmadas'}">0 confirmadas</span>
                </div>

                <div class="desktop-dashboard-card border-yellow">
                    <h3>Pendentes</h3>
                    <strong class="text-yellow" th:text="${reservasPendentes}">0</strong>
                    <span>a aguardar confirmação</span>
                </div>
            </div>

            <div class="dashboard-today-bar">
                <strong>Hoje ·</strong>
                <span>Corridas hoje: <b th:text="${corridasHoje}">0</b></span>
                <span>Reservas hoje: <b th:text="${reservasHoje}">0</b></span>
                <span>Confirmadas: <b th:text="${confirmadasHoje}">0</b></span>
                <span>Canceladas: <b th:text="${canceladasHoje}">0</b></span>
            </div>
        </div>
    </section>
</main>
</body>
</html>
