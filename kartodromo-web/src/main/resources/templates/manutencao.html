<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Manutenção — Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Manutenção</h1>
            <p>Gestão de manutenções e revisões de karts</p>
        </div>
        <button class="btn btn-green" onclick="openModal('modal-registar')">+ Registar Manutenção</button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert-error"   th:text="${erro}"></div>

    <!-- Em curso -->
    <div class="card" th:if="${!#lists.isEmpty(emCurso)}">
        <div class="card-title" style="color:var(--red)">🔧 Em Curso</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Kart</th><th>Descrição</th><th>Tipo</th><th>Entrada</th><th>Próx. Revisão</th><th>Ação</th></tr></thead>
                <tbody>
                    <tr th:each="m : ${emCurso}">
                        <td><strong th:text="'#' + ${m.kart.numero}"></strong></td>
                        <td th:text="${m.descricao}"></td>
                        <td><span class="badge badge-blue" th:text="${m.tipo}"></span></td>
                        <td th:text="${#temporals.format(m.dataEntrada,'dd/MM/yyyy')}" class="text-gray"></td>
                        <td th:text="${m.proximaRevisao != null ? #temporals.format(m.proximaRevisao,'dd/MM/yyyy') : '—'}" class="text-gray"></td>
                        <td>
                            <form method="post" action="/manutencao/concluir" style="display:inline">
                                <input type="hidden" name="id" th:value="${m.id}"/>
                                <input type="hidden" name="libertar" value="sim"/>
                                <button type="submit" class="btn btn-green btn-xs">✓ Concluir e Libertar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Próximas revisões -->
    <div class="card" th:if="${!#lists.isEmpty(revisoes)}">
        <div class="card-title" style="color:var(--orange,#f57c00)">📅 Próximas Revisões (30 dias)</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Kart</th><th>Descrição</th><th>Tipo</th><th>Próx. Revisão</th></tr></thead>
                <tbody>
                    <tr th:each="m : ${revisoes}">
                        <td><strong th:text="'#' + ${m.kart.numero}"></strong></td>
                        <td th:text="${m.descricao}"></td>
                        <td><span class="badge badge-blue" th:text="${m.tipo}"></span></td>
                        <td th:text="${#temporals.format(m.proximaRevisao,'dd/MM/yyyy')}" class="text-gray"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Histórico -->
    <div class="card">
        <div class="card-title">Histórico</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Kart</th><th>Descrição</th><th>Tipo</th><th>Entrada</th><th>Saída</th><th>Estado</th></tr></thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(historico)}">
                        <td colspan="6" style="text-align:center;color:var(--text-gray);padding:24px">Nenhuma manutenção registada.</td>
                    </tr>
                    <tr th:each="m : ${historico}">
                        <td><strong th:text="'#' + ${m.kart.numero}"></strong></td>
                        <td th:text="${m.descricao}"></td>
                        <td><span class="badge badge-blue" th:text="${m.tipo}"></span></td>
                        <td th:text="${#temporals.format(m.dataEntrada,'dd/MM/yyyy')}" class="text-gray"></td>
                        <td th:text="${m.dataSaida != null ? #temporals.format(m.dataSaida,'dd/MM/yyyy') : '—'}" class="text-gray"></td>
                        <td>
                            <span class="badge badge-green" th:if="${m.concluida}">Concluída</span>
                            <span class="badge badge-red"   th:if="${!m.concluida}">Em Curso</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Registar -->
<div class="modal-overlay" id="modal-registar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-registar')">✕</button>
        <h2>Registar Manutenção</h2>
        <form method="post" action="/manutencao/registar">
            <div class="form-row">
                <div class="form-group">
                    <label>Kart</label>
                    <select name="kartId" required>
                        <option th:each="k : ${karts}" th:value="${k.id}" th:text="'#' + ${k.numero} + ' — ' + ${k.categoria.descricao}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select name="tipo" required>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <input type="text" name="descricao" required/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Próxima Revisão (opcional)</label>
                    <input type="date" name="proximaRevisao"/>
                </div>
                <div class="form-group">
                    <label>Bloquear Kart?</label>
                    <select name="bloquear">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">Registar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-registar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
