<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Corridas — Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Corridas</h1>
            <p>Gestão de corridas agendadas</p>
        </div>
        <button class="btn btn-green" onclick="openModal('modal-criar')">+ Nova Corrida</button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert-error"   th:text="${erro}"></div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Data / Hora</th>
                        <th>Layout</th>
                        <th>Categoria</th>
                        <th>Duração</th>
                        <th>Vagas</th>
                        <th>Cliente</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(corridas)}">
                        <td colspan="8" style="text-align:center;color:var(--text-gray);padding:24px">Nenhuma corrida registada.</td>
                    </tr>
                    <tr th:each="c : ${corridas}">
                        <td th:text="${c.id}" class="text-gray"></td>
                        <td class="nowrap" th:text="${#temporals.format(c.dataHoraInicio,'dd/MM/yyyy HH:mm')}"></td>
                        <td><strong th:text="${c.layoutNome}"></strong></td>
                        <td th:text="${c.categoria.descricao}" class="text-gray"></td>
                        <td th:text="${c.duracaoMinutos} + ' min'"></td>
                        <td><span class="badge badge-blue" th:text="${c.vagasMaximas}"></span></td>
                        <td th:text="${c.cliente.nome}" class="text-gray"></td>
                        <td>
                            <div class="flex gap-8">
                                <button class="btn btn-blue btn-xs"
                                        th:attr="data-id=${c.id},data-data-hora-inicio=${#temporals.format(c.dataHoraInicio,'yyyy-MM-dd') + 'T' + #temporals.format(c.dataHoraInicio,'HH:mm')},data-duracao-minutos=${c.duracaoMinutos},data-vagas-maximas=${c.vagasMaximas},data-categoria-id=${c.categoria.id},data-cliente-id=${c.cliente.id},data-layout-nome=${c.layoutNome}"
                                        onclick="populateEditFromDataset(this,'modal-editar')">
                                    ✎ Editar
                                </button>
                                <form th:id="'del-' + ${c.id}" method="post" action="/corridas/remover">
                                    <input type="hidden" name="id" th:value="${c.id}"/>
                                    <button type="button" class="btn btn-red btn-xs"
                                            th:attr="data-form-id='del-' + ${c.id},data-msg='Eliminar corrida?'"
                                            onclick="confirmDeleteEl(this)">🗑</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Criar -->
<div class="modal-overlay" id="modal-criar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-criar')">✕</button>
        <h2>Nova Corrida</h2>
        <form method="post" action="/corridas/criar">
            <div class="form-row">
                <div class="form-group">
                    <label>Data / Hora Início</label>
                    <input type="datetime-local" name="dataHoraInicio" required/>
                </div>
                <div class="form-group">
                    <label>Layout / Pista</label>
                    <input type="text" name="layoutNome" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Duração (min)</label>
                    <input type="number" name="duracaoMinutos" min="1" value="30" required/>
                </div>
                <div class="form-group">
                    <label>Vagas Máximas</label>
                    <input type="number" name="vagasMaximas" min="1" value="10" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cliente</label>
                    <select name="clienteId" required>
                        <option value="">Selecionar...</option>
                        <option th:each="cl : ${clientes}" th:value="${cl.id}" th:text="${cl.nome}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoriaId" required>
                        <option value="">Selecionar...</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.descricao}"></option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">Criar Corrida</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-criar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar -->
<div class="modal-overlay" id="modal-editar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-editar')">✕</button>
        <h2>Editar Corrida</h2>
        <form method="post" action="/corridas/atualizar">
            <input type="hidden" name="id"/>
            <div class="form-row">
                <div class="form-group">
                    <label>Data / Hora Início</label>
                    <input type="datetime-local" name="dataHoraInicio" required/>
                </div>
                <div class="form-group">
                    <label>Layout / Pista</label>
                    <input type="text" name="layoutNome" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Duração (min)</label>
                    <input type="number" name="duracaoMinutos" min="1" required/>
                </div>
                <div class="form-group">
                    <label>Vagas Máximas</label>
                    <input type="number" name="vagasMaximas" min="1" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cliente</label>
                    <select name="clienteId" required>
                        <option th:each="cl : ${clientes}" th:value="${cl.id}" th:text="${cl.nome}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoriaId" required>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.descricao}"></option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-blue">Guardar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-editar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
