<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Notificações — Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Notificações</h1>
            <p>Alertas e avisos do sistema</p>
        </div>

        <a href="/notificacoes" class="btn btn-gray">🔄 Atualizar</a>
    </div>

    <!-- Vista CLIENTE -->
    <div th:if="${clienteView}">
        <div th:if="${#lists.isEmpty(notificacoesCliente)}" class="card" style="text-align:center;padding:60px">
            <div style="font-size:42px;margin-bottom:16px">🔔</div>
            <p class="text-gray">Sem notificações de momento.</p>
        </div>

        <div th:each="n : ${notificacoesCliente}" class="card">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-8">
                    <div style="font-size:24px">🔔</div>
                    <div>
                        <strong th:text="${n.titulo}">Notificação</strong>
                        <div class="text-gray mt-8" th:text="${n.descricao}">Descrição</div>
                    </div>
                </div>

                <span th:if="${n.tipo == 'CONFIRMADA'}" class="badge badge-green">Confirmada</span>
                <span th:if="${n.tipo == 'PENDENTE'}" class="badge badge-orange">Pendente</span>
                <span th:if="${n.tipo == 'CANCELADA'}" class="badge badge-red">Cancelada</span>
            </div>
        </div>
    </div>

    <!-- Vista ADMIN/FUNCIONÁRIO -->
    <div th:if="${!clienteView}">
        <div th:if="${#lists.isEmpty(notificacoes)}" class="card" style="text-align:center;padding:60px">
            <div style="font-size:42px;margin-bottom:16px">🔔</div>
            <p class="text-gray">Sem notificações de momento.</p>
        </div>

        <div th:each="n : ${notificacoes}" class="card">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-8">
                    <div style="font-size:24px">🔧</div>
                    <div>
                        <strong th:text="${n.titulo}">Notificação</strong>
                        <div class="text-gray mt-8" th:text="${n.descricao}">Descrição</div>
                    </div>
                </div>

                <span class="badge badge-red">Manutenção</span>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
