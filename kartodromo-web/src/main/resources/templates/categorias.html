<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Categorias - Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Categorias</h1>
            <p>Categorias de karts e preços base</p>
        </div>
        <button class="btn btn-green" onclick="openModal('modal-criar')">+ Nova Categoria</button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert-error"   th:text="${erro}"></div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Descrição</th>
                        <th>Cilindrada (cc)</th>
                        <th>Idade Mín.</th>
                        <th>Exp. Mín.</th>
                        <th>Preço Base</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="7" style="text-align:center;color:var(--text-gray);padding:24px">Nenhuma categoria criada.</td>
                    </tr>
                    <tr th:each="c : ${categorias}">
                        <td th:text="${c.id}" class="text-gray"></td>
                        <td><strong th:text="${c.descricao}"></strong></td>
                        <td th:text="${c.cilindrada} + ' cc'"></td>
                        <td th:text="${c.idadeMinima} + ' anos'"></td>
                        <td><span class="badge badge-blue" th:text="${c.experienciaMinima}"></span></td>
                        <td><strong th:text="${#numbers.formatDecimal(c.precoBase,1,2)} + ' €'"></strong></td>
                        <td>
                            <div class="flex gap-8">
                                <button class="btn btn-blue btn-xs"
                                        th:attr="data-id=${c.id},data-cilindrada=${c.cilindrada},data-descricao=${c.descricao},data-idade-minima=${c.idadeMinima},data-experiencia-minima=${c.experienciaMinima},data-preco-base=${c.precoBase}"
                                        onclick="populateEditFromDataset(this,'modal-editar')">
                                    ✎ Editar
                                </button>
                                <form th:id="'del-' + ${c.id}" method="post" action="/categorias/remover">
                                    <input type="hidden" name="id" th:value="${c.id}"/>
                                    <button type="button" class="btn btn-red btn-xs"
                                            th:attr="data-form-id='del-' + ${c.id},data-msg='Remover categoria ' + ${c.descricao} + '?'"
                                            onclick="confirmDeleteEl(this)">
                                        🗑 Remover
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Criar -->
<div class="modal-overlay" id="modal-criar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-criar')">✕</button>
        <h2>Nova Categoria</h2>
        <form method="post" action="/categorias/criar">
            <div class="form-row">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" name="descricao" required/>
                </div>
                <div class="form-group">
                    <label>Cilindrada (cc)</label>
                    <input type="number" name="cilindrada" min="1" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Idade Mínima</label>
                    <input type="number" name="idadeMinima" min="0" value="16" required/>
                </div>
                <div class="form-group">
                    <label>Experiência Mínima</label>
                    <input type="number" name="experienciaMinima" min="0" value="0" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Preço Base (€)</label>
                    <input type="number" name="precoBase" min="0" step="0.01" value="10.00" required/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">Criar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-criar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar -->
<div class="modal-overlay" id="modal-editar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-editar')">✕</button>
        <h2>Editar Categoria</h2>
        <form method="post" action="/categorias/atualizar">
            <input type="hidden" name="id"/>
            <div class="form-row">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" name="descricao" required/>
                </div>
                <div class="form-group">
                    <label>Cilindrada (cc)</label>
                    <input type="number" name="cilindrada" min="1" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Idade Mínima</label>
                    <input type="number" name="idadeMinima" min="0" required/>
                </div>
                <div class="form-group">
                    <label>Experiência Mínima</label>
                    <input type="number" name="experienciaMinima" min="0" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Preço Base (€)</label>
                    <input type="number" name="precoBase" min="0" step="0.01" required/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-blue">Guardar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-editar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
