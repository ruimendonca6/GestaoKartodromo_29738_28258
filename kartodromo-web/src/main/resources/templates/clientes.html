<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Clientes — Kartódromo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<main class="main">
    <div class="page-header flex justify-between items-center">
        <div>
            <h1>Clientes</h1>
            <p>Gestão de clientes registados</p>
        </div>
        <button class="btn btn-green" onclick="openModal('modal-criar')">+ Novo Cliente</button>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert-error"   th:text="${erro}"></div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Data Nasc.</th>
                        <th>Nível Exp.</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" style="text-align:center;color:var(--text-gray);padding:24px">Nenhum cliente registado.</td>
                    </tr>
                    <tr th:each="c : ${clientes}">
                        <td th:text="${c.id}" class="text-gray"></td>
                        <td><strong th:text="${c.nome}"></strong></td>
                        <td th:text="${c.email}" class="text-gray"></td>
                        <td th:text="${c.dataNascimento}" class="text-gray"></td>
                        <td><span class="badge badge-blue" th:text="${c.nivelExperiencia}"></span></td>
                        <td>
                            <div class="flex gap-8">
                                <button class="btn btn-blue btn-xs"
                                        th:attr="data-id=${c.id},data-nome=${c.nome},data-email=${c.email},data-data-nascimento=${c.dataNascimento},data-nivel-experiencia=${c.nivelExperiencia}"
                                        onclick="populateEditFromDataset(this,'modal-editar')">
                                    ✎ Editar
                                </button>
                                <form th:id="'del-' + ${c.id}" method="post" action="/clientes/remover">
                                    <input type="hidden" name="id" th:value="${c.id}"/>
                                    <button type="button" class="btn btn-red btn-xs"
                                            th:attr="data-form-id='del-' + ${c.id},data-msg='Remover cliente ' + ${c.nome} + '?'"
                                            onclick="confirmDeleteEl(this)">
                                        🗑 Remover
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Criar -->
<div class="modal-overlay" id="modal-criar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-criar')">✕</button>
        <h2>Novo Cliente</h2>
        <form method="post" action="/clientes/criar">
            <div class="form-row">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Data Nascimento</label>
                    <input type="date" name="dataNascimento" required/>
                </div>
                <div class="form-group">
                    <label>Nível Experiência (0-10)</label>
                    <input type="number" name="nivelExperiencia" min="0" max="10" value="0" required/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">Criar Cliente</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-criar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Editar -->
<div class="modal-overlay" id="modal-editar">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-editar')">✕</button>
        <h2>Editar Cliente</h2>
        <form method="post" action="/clientes/atualizar">
            <input type="hidden" name="id"/>
            <div class="form-row">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Data Nascimento</label>
                    <input type="date" name="dataNascimento" required/>
                </div>
                <div class="form-group">
                    <label>Nível Experiência (0-10)</label>
                    <input type="number" name="nivelExperiencia" min="0" max="10" required/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-blue">Guardar</button>
                <button type="button" class="btn btn-gray" onclick="closeModal('modal-editar')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
